<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNC Flow — Agente de Lançamento</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0805;
  --bg2: #150f08;
  --bg3: #1e160a;
  --card: #1a100a;
  --border: rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.12);
  --accent: #e07428;
  --accent2: #ff9a4d;
  --text: #f0e6d8;
  --text2: #b89878;
  --text3: #7a6050;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #60a5fa;
  --amber: #f59e0b;
  --font: 'Syne', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

/* ── LAYOUT ── */
.shell { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }
.sidebar { background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.main { display: flex; flex-direction: column; overflow: hidden; }

/* ── SIDEBAR ── */
.logo { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); }
.logo-text { font-size: 20px; font-weight: 800; letter-spacing: -.5px; }
.logo-text span { color: var(--accent); }
.logo-sub { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .15em; color: var(--text3); margin-top: 3px; }

.phases { flex: 1; overflow-y: auto; padding: 10px 10px 0; }
.phases::-webkit-scrollbar { width: 3px; }
.phases::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.phase-group { margin-bottom: 6px; }
.phase-hdr { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background .15s; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
.phase-hdr:hover { background: rgba(255,255,255,.04); }
.phase-hdr.active { background: rgba(224,116,40,.12); color: var(--accent); }
.phase-num { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.p1 { background: rgba(245,158,11,.2); color: var(--amber); }
.p2 { background: rgba(96,165,250,.2); color: var(--blue); }
.p3 { background: rgba(224,116,40,.2); color: var(--accent); }
.p4 { background: rgba(34,197,94,.2); color: var(--green); }

.task-list { padding: 4px 4px 4px 14px; display: flex; flex-direction: column; gap: 2px; }
.task-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: background .12s; font-size: 11px; color: var(--text2); line-height: 1.4; }
.task-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
.task-item.selected { background: rgba(224,116,40,.1); color: var(--text); }
.task-item.done { color: var(--text3); text-decoration: line-through; }
.task-cb { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border2); flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all .12s; }
.task-cb.checked { background: var(--green); border-color: var(--green); color: #fff; }

.progress-bar-wrap { padding: 12px 10px; border-top: 1px solid var(--border); }
.progress-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-bottom: 6px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
.progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s ease; }

/* ── MAIN ── */
.topbar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; background: var(--bg); flex-shrink: 0; }
.topbar-title { flex: 1; font-size: 14px; font-weight: 700; color: var(--text2); }
.topbar-title b { color: var(--text); }
.mode-btns { display: flex; gap: 4px; background: var(--bg3); padding: 3px; border-radius: 8px; }
.mode-btn { padding: 5px 12px; border: none; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--font); color: var(--text3); background: transparent; transition: all .12s; letter-spacing: .05em; text-transform: uppercase; }
.mode-btn.active { background: var(--accent); color: #1a0805; }

/* ── CONTENT AREA ── */
.content-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* CHAT MODE */
.chat-messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.msg { display: flex; gap: 12px; max-width: 100%; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }
.msg.agent .msg-avatar { background: linear-gradient(135deg, var(--accent), #c85510); color: #fff; font-size: 12px; }
.msg.user .msg-avatar { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); font-size: 11px; }
.msg-bubble { padding: 12px 15px; border-radius: 12px; font-size: 13px; line-height: 1.7; max-width: calc(100% - 48px); }
.msg.agent .msg-bubble { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px 12px 12px 12px; }
.msg.user .msg-bubble { background: linear-gradient(135deg, var(--accent), #c86010); color: #fff; border-radius: 12px 4px 12px 12px; }
.msg-bubble pre { font-family: var(--mono); font-size: 11px; background: rgba(0,0,0,.3); padding: 10px 12px; border-radius: 6px; margin: 8px 0; overflow-x: auto; border: 1px solid rgba(255,255,255,.06); }
.msg-bubble strong { color: var(--accent2); }
.msg-bubble code { font-family: var(--mono); font-size: 11px; background: rgba(224,116,40,.15); padding: 1px 5px; border-radius: 3px; color: var(--accent2); }

.quick-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 24px 10px; }
.quick-btn { padding: 6px 12px; border: 1px solid var(--border2); border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--text2); background: var(--bg3); cursor: pointer; font-family: var(--font); transition: all .12s; }
.quick-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(224,116,40,.08); }

.chat-input-wrap { padding: 14px 24px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
.chat-input-row { display: flex; gap: 10px; }
.chat-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 11px 14px; font-size: 13px; color: var(--text); font-family: var(--font); outline: none; resize: none; transition: border .15s; min-height: 46px; max-height: 120px; }
.chat-input:focus { border-color: var(--accent); }
.send-btn { padding: 11px 18px; background: var(--accent); border: none; border-radius: 10px; font-size: 13px; font-weight: 700; color: #1a0805; cursor: pointer; font-family: var(--font); transition: opacity .12s; flex-shrink: 0; }
.send-btn:hover { opacity: .88; }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }

/* TASK DETAIL MODE */
.task-detail { flex: 1; overflow-y: auto; padding: 24px; }
.task-detail::-webkit-scrollbar { width: 3px; }
.task-detail::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.detail-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; margin-bottom: 14px; }
.detail-tag { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-right: 6px; }
.tag-critico { background: rgba(239,68,68,.15); color: var(--red); }
.tag-alto { background: rgba(245,158,11,.15); color: var(--amber); }
.tag-medio { background: rgba(96,165,250,.15); color: var(--blue); }
.tag-baixo { background: rgba(34,197,94,.15); color: var(--green); }
.detail-title { font-size: 18px; font-weight: 800; color: var(--text); margin: 10px 0 6px; line-height: 1.3; }
.detail-meta { font-size: 11px; color: var(--text3); margin-bottom: 14px; }
.detail-desc { font-size: 13px; color: var(--text2); line-height: 1.8; }
.detail-section { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 10px; }
.step { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text2); line-height: 1.6; }
.step:last-child { border: none; }
.step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #1a0805; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.ask-agent-btn { padding: 10px 16px; background: linear-gradient(135deg, var(--accent), #c85510); border: none; border-radius: 8px; font-size: 12px; font-weight: 700; color: #1a0805; cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 6px; margin-top: 12px; transition: opacity .12s; }
.ask-agent-btn:hover { opacity: .88; }

/* SPINNER */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(224,116,40,.3); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; display: inline-block; }
.msg { animation: fadeIn .2s ease; }

/* EMPTY */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text3); text-align: center; padding: 40px; }
.empty-icon { font-size: 40px; opacity: .4; }
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">DNC<span>flow</span></div>
      <div class="logo-sub">Agente de Lançamento</div>
    </div>

    <div class="phases" id="phases-list"></div>

    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>Progresso geral</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title"><b>DNC Flow</b> — Selecione uma tarefa ou faça uma pergunta</div>
      <div class="mode-btns">
        <button class="mode-btn active" onclick="setMode('chat')" id="btn-chat">💬 Chat</button>
        <button class="mode-btn" onclick="setMode('detail')" id="btn-detail">📋 Tarefa</button>
      </div>
    </div>

    <div class="content-area">
      <!-- CHAT -->
      <div id="view-chat" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div class="chat-messages" id="chat-msgs"></div>
        <div class="quick-btns" id="quick-btns"></div>
        <div class="chat-input-wrap">
          <div class="chat-input-row">
            <textarea class="chat-input" id="chat-input" placeholder="Pergunte sobre qualquer tarefa, fase ou decisão técnica..." rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMsg()">Enviar</button>
          </div>
        </div>
      </div>

      <!-- TASK DETAIL -->
      <div id="view-detail" style="display:none;flex:1;overflow:hidden;flex-direction:column">
        <div class="task-detail" id="task-detail-content">
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <div style="font-size:14px;font-weight:700">Nenhuma tarefa selecionada</div>
            <div style="font-size:12px">Clique em uma tarefa na sidebar</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>

// ── CONTEXTO DO AGENTE ────────────────────────────────────────────────────
const AGENT_CONTEXT = `Você é o Agente de Lançamento do DNC Flow — assistente especializado exclusivamente no projeto de lançamento deste app SaaS para vendedores do Mercado Livre.

Responda SEMPRE em português do Brasil. Seja direto, técnico e prático. Quando der instruções, use passos numerados. Quando houver código, formate com blocos de código. Foque 100% no DNC Flow — não divague para outros projetos.`;

// ── STATE ─────────────────────────────────────────────────────────────────
let state = {
  tasks: {},
  selectedTask: null,
  mode: 'chat',
  messages: [],
  loading: false
};

// Load saved task states
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem('dnc-agent-state') || '{}');
    state.tasks = saved.tasks || {};
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('dnc-agent-state', JSON.stringify({ tasks: state.tasks }));
}

function getApiKey() {
  return localStorage.getItem('af-apikey') || '';
}

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('phases-list');
  let total = 0, done = 0;

  el.innerHTML = ROADMAP.map(phase => {
    total += phase.tasks.length;
    const phaseDone = phase.tasks.filter(t => state.tasks[t.id]).length;
    done += phaseDone;

    return `<div class="phase-group">
      <div class="phase-hdr" onclick="togglePhase('${phase.id}')">
        <span class="phase-num ${phase.cls}">${phase.id.replace('f','')}</span>
        <span style="flex:1">${phase.label}</span>
        <span style="font-size:10px;color:var(--text3);font-weight:600">${phaseDone}/${phase.tasks.length}</span>
      </div>
      <div class="task-list" id="phase-${phase.id}">
        ${phase.tasks.map(task => {
          const isDone = state.tasks[task.id];
          const isSelected = state.selectedTask?.id === task.id;
          return `<div class="task-item ${isDone?'done':''} ${isSelected?'selected':''}" onclick="selectTask('${task.id}')">
            <div class="task-cb ${isDone?'checked':''}" onclick="toggleTask('${task.id}');event.stopPropagation()">${isDone?'✓':''}</div>
            <span>${task.title}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  const pct = Math.round(done / total * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function togglePhase(id) {
  const el = document.getElementById('phase-' + id);
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

function toggleTask(taskId) {
  state.tasks[taskId] = !state.tasks[taskId];
  saveState();
  renderSidebar();
  if (state.selectedTask?.id === taskId) renderTaskDetail(state.selectedTask);
}

function getTaskById(id) {
  for (const phase of ROADMAP) {
    const t = phase.tasks.find(t => t.id === id);
    if (t) return t;
  }
  return null;
}

function selectTask(taskId) {
  const task = getTaskById(taskId);
  state.selectedTask = task;
  renderSidebar();
  if (state.mode === 'chat') {
    // Update topbar and switch to chat with task context
    document.getElementById('topbar-title').innerHTML = `<b>${task.title}</b>`;
    const qs = document.getElementById('quick-btns');
    qs.innerHTML = [
      'Como fazer isso?',
      'Quanto tempo leva?',
      'Algum risco nessa tarefa?',
      'Preciso de ajuda com o código',
    ].map(q => `<button class="quick-btn" onclick="askQuick('${q}')">${q}</button>`).join('');
  } else {
    setMode('detail');
  }
}

// ── TASK DETAIL ───────────────────────────────────────────────────────────
function renderTaskDetail(task) {
  if (!task) return;
  const isDone = state.tasks[task.id];
  const prioMap = { critico: 'tag-critico', alto: 'tag-alto', medio: 'tag-medio', baixo: 'tag-baixo' };

  document.getElementById('task-detail-content').innerHTML = `
    <div class="detail-card">
      <div>
        <span class="detail-tag ${prioMap[task.prio]}">${task.prio.toUpperCase()}</span>
        <span class="detail-tag" style="background:rgba(255,255,255,.06);color:var(--text3)">FASE ${task.fase}</span>
        ${isDone ? '<span class="detail-tag" style="background:rgba(34,197,94,.15);color:var(--green)">✓ CONCLUÍDO</span>' : ''}
      </div>
      <div class="detail-title">${task.title}</div>
      <div class="detail-meta">Fase ${task.fase} do roadmap DNC Flow</div>
      <div class="detail-desc">${task.desc}</div>
      <button class="ask-agent-btn" onclick="askAboutTask()">
        <span>✨</span> Pedir ajuda da IA nesta tarefa
      </button>
    </div>

    <div class="detail-card">
      <div class="detail-section">Passos de execução</div>
      ${task.steps.map((s, i) => `
        <div class="step">
          <div class="step-num">${i+1}</div>
          <div>${s}</div>
        </div>
      `).join('')}
    </div>

    <div class="detail-card" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--text2)">Marcar como ${isDone ? 'pendente' : 'concluída'}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">Atualiza o progresso geral do projeto</div>
      </div>
      <button onclick="toggleTask('${task.id}')" style="padding:8px 16px;border:1px solid ${isDone ? 'var(--red)' : 'var(--green)'};border-radius:8px;background:transparent;color:${isDone ? 'var(--red)' : 'var(--green)'};font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)">
        ${isDone ? '↩ Desfazer' : '✓ Concluir'}
      </button>
    </div>
  `;
}

function askAboutTask() {
  if (!state.selectedTask) return;
  setMode('chat');
  const q = `Me ajude a executar esta tarefa: "${state.selectedTask.title}". Quero instruções detalhadas e práticas para fazer isso agora.`;
  document.getElementById('chat-input').value = q;
  sendMsg();
}

// ── CHAT ──────────────────────────────────────────────────────────────────
function setMode(mode) {
  state.mode = mode;
  document.getElementById('view-chat').style.display = mode === 'chat' ? 'flex' : 'none';
  document.getElementById('view-detail').style.display = mode === 'detail' ? 'flex' : 'none';
  document.getElementById('btn-chat').classList.toggle('active', mode === 'chat');
  document.getElementById('btn-detail').classList.toggle('active', mode === 'detail');
  if (mode === 'detail' && state.selectedTask) renderTaskDetail(state.selectedTask);
}

function appendMsg(role, content) {
  const msgs = document.getElementById('chat-msgs');
  const isAgent = role === 'agent';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${isAgent ? 'DF' : 'AG'}</div>
    <div class="msg-bubble">${isAgent ? formatMd(content) : escHtml(content)}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function appendLoading() {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'loading-msg';
  div.innerHTML = `<div class="msg-avatar">DF</div><div class="msg-bubble"><span class="spinner"></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeLoading() {
  document.getElementById('loading-msg')?.remove();
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatMd(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function askQuick(q) {
  document.getElementById('chat-input').value = q;
  sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || state.loading) return;

  const apiKey = getApiKey();
  if (!apiKey) {
    appendMsg('agent', '⚠️ **API Key não configurada.** Abra o DNC Flow principal → Configurações → Geral → informe sua Anthropic API Key. A mesma chave é usada aqui.');
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  state.loading = true;
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', text);
  state.messages.push({ role: 'user', content: text });
  appendLoading();

  // Build context with current task if selected
  let userContent = text;
  if (state.selectedTask) {
    userContent = `[Contexto: estou olhando a tarefa "${state.selectedTask.title}" da Fase ${state.selectedTask.fase}. Descrição: ${state.selectedTask.desc}. Passos: ${state.selectedTask.steps.join(' | ')}]\n\nPergunta: ${text}`;
  }

  const messages = [
    ...state.messages.slice(0, -1),
    { role: 'user', content: userContent }
  ];

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: AGENT_CONTEXT,
        messages: messages.slice(-10)
      })
    });
    const data = await res.json();
    const reply = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || 'Erro ao gerar resposta.';
    removeLoading();
    appendMsg('agent', reply);
    state.messages.push({ role: 'assistant', content: reply });
  } catch(e) {
    removeLoading();
    appendMsg('agent', `**Erro:** ${e.message}`);
  }

  state.loading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadState();
renderSidebar();
setMode('chat');

// Welcome message
appendMsg('agent', `**Olá, André!** Sou o Agente de Lançamento do DNC Flow. 🚀

// Set quick btns initial
document.getElementById('quick-btns').innerHTML = [
  'O que fazer primeiro?',
  'Quanto tempo leva a Fase 1?',
  'Como fazer o upgrade do Cloudflare?',

].map(q => `<button class="quick-btn" onclick="askQuick('${q}')">${q}</button>`).join('');

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
