<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DNC Flow — Diagnóstico Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:#0f0a06;color:#f5ede6;padding:20px;min-height:100vh}
h1{font-size:18px;font-weight:900;color:#e07428;margin-bottom:4px}
.sub{font-size:12px;color:#9a7060;margin-bottom:20px}
.card{background:#1a0e05;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.row:last-child{border:none}
.label{color:#9a7060}
.val{font-weight:700}
.ok{color:#22c55e}.err{color:#ef4444}.warn{color:#f59e0b}
.btn{padding:12px 20px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%;font-family:Inter,sans-serif;margin-top:8px}
.btn-orange{background:#e07428;color:#1a0e05}
.btn-red{background:#dc2626;color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-gray{background:#374151;color:#fff}
.status{padding:10px 14px;border-radius:8px;font-size:12px;font-weight:600;margin-top:8px}
.log{background:#0a0605;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:12px;font-size:11px;font-family:monospace;line-height:1.7;max-height:300px;overflow-y:auto;margin-top:8px}
</style>
</head>
<body>
<h1>🔍 Diagnóstico Supabase — DNC Flow</h1>
<div class="sub">Roda automaticamente. Mostra o estado real do banco de dados.</div>

<div class="card" id="card-status">
  <div class="row"><span class="label">Conexão Supabase</span><span class="val" id="r-conn">Testando...</span></div>
  <div class="row"><span class="label">Tabela dnc_tasks</span><span class="val" id="r-table">Verificando...</span></div>
  <div class="row"><span class="label">Tasks no Supabase</span><span class="val" id="r-count">—</span></div>
  <div class="row"><span class="label">Tasks no localStorage</span><span class="val" id="r-ls">—</span></div>
  <div class="row"><span class="label">Último save detectado</span><span class="val" id="r-last">—</span></div>
</div>

<div class="card" id="card-tasks" style="display:none">
  <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9a7060;margin-bottom:8px">Tarefas encontradas no Supabase</div>
  <div id="task-list" class="log"></div>
</div>

<div class="card">
  <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9a7060;margin-bottom:8px">Ações</div>
  <button class="btn btn-orange" onclick="injetarTarefas()">🚀 Injetar 20 tarefas de auditoria</button>
  <button class="btn btn-green" onclick="testarEscrita()" style="margin-top:6px">✍ Testar escrita no Supabase</button>
  <button class="btn btn-gray" onclick="verLocalStorage()" style="margin-top:6px">📋 Ver tasks do localStorage</button>
  <button class="btn btn-red" onclick="sincronizarLS()" style="margin-top:6px">⚡ Copiar localStorage → Supabase</button>
</div>

<div class="log" id="log">Iniciando diagnóstico...<br></div>

<script>
const SB_URL='https://zyidoasvvutddutyezwj.supabase.co';
const SB_KEY='sb_publishable_nkRlbfzMKrsc-6pScUsjlg_VleZP0iy';
const sb=supabase.createClient(SB_URL,SB_KEY);

const log=s=>{const el=document.getElementById('log');el.innerHTML+=s+'<br>';el.scrollTop=el.scrollHeight;};
const set=(id,val,cls)=>{const el=document.getElementById(id);el.textContent=val;if(cls)el.className='val '+cls;};

const gid=()=>'aud'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const td=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const tdN=n=>{const d=new Date();d.setDate(d.getDate()+n);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};

async function diagnostico(){
  log('🔗 Testando conexão Supabase...');
  
  // Test 1: basic connection
  try{
    const{data,error}=await sb.from('dnc_tasks').select('count');
    if(error){
      set('r-conn','Erro: '+error.message,'err');
      log('❌ Conexão falhou: '+error.message+' (code: '+error.code+')');
      if(error.code==='42P01'){log('⚠ Tabela dnc_tasks NÃO EXISTE no Supabase!');}
      if(error.message.includes('permission')||error.code==='42501'){log('⚠ RLS bloqueando acesso — sem policy de leitura');}
    }else{
      set('r-conn','✓ OK','ok');
      log('✅ Conexão OK');
    }
  }catch(e){
    set('r-conn','Erro: '+e.message,'err');
    log('❌ Erro de conexão: '+e.message);
  }

  // Test 2: read row
  log('📖 Lendo dnc_tasks onde id=andre_godoy...');
  try{
    const{data,error}=await sb.from('dnc_tasks').select('data').eq('id','andre_godoy').single();
    if(error){
      if(error.code==='PGRST116'){
        set('r-table','Tabela OK, row vazio','warn');
        set('r-count','0 (row não existe)','warn');
        log('⚠ Tabela existe mas SEM ROW para andre_godoy — dados nunca foram salvos no Supabase');
        log('→ Provável causa: RLS bloqueando INSERT/UPSERT');
      }else{
        set('r-table','Erro: '+error.code,'err');
        log('❌ Erro ao ler: '+JSON.stringify(error));
      }
    }else if(data?.data){
      let tasks=[];
      try{tasks=JSON.parse(data.data);}catch(e){}
      set('r-table','✓ Row encontrado','ok');
      set('r-count',tasks.length+' tarefas','ok');
      log('✅ Supabase tem '+tasks.length+' tarefas');
      if(tasks.length>0){
        document.getElementById('card-tasks').style.display='block';
        document.getElementById('task-list').innerHTML=tasks.map(t=>`${t.prio?.toUpperCase()||'?'} | ${(t.title||'').slice(0,70)}`).join('<br>');
      }
      set('r-last',data.updated_at||'—');
    }else{
      set('r-table','Row vazio','warn');
      set('r-count','0','warn');
      log('⚠ Row existe mas data está vazio');
    }
  }catch(e){
    log('❌ Exceção ao ler: '+e.message);
  }

  // Test 3: localStorage
  try{
    const ls=JSON.parse(localStorage.getItem('dnc-tasks-v1')||'[]');
    set('r-ls',ls.length+' tarefas');
    log('📱 localStorage tem '+ls.length+' tarefas: '+ls.slice(0,3).map(t=>t.title?.slice(0,30)).join(', '));
  }catch(e){
    set('r-ls','Erro','err');
    log('❌ Erro ao ler localStorage: '+e.message);
  }

  log('✔ Diagnóstico concluído');
}

async function testarEscrita(){
  log('✍ Testando escrita no Supabase...');
  try{
    const{error}=await sb.from('dnc_tasks').upsert({id:'andre_godoy_test',data:'["teste"]'},{onConflict:'id'});
    if(error){
      log('❌ ESCRITA BLOQUEADA: '+error.message+' | code: '+error.code);
      log('→ Isso confirma que RLS está bloqueando INSERT/UPSERT');
      log('→ Solução: no Supabase, vá em Authentication > Policies > dnc_tasks e adicione policy FOR ALL WITH CHECK (true)');
    }else{
      log('✅ Escrita OK! Removendo registro de teste...');
      await sb.from('dnc_tasks').delete().eq('id','andre_godoy_test');
      log('✅ Delete OK. Supabase está funcionando para leitura e escrita.');
    }
  }catch(e){
    log('❌ Exceção na escrita: '+e.message);
  }
}

async function sincronizarLS(){
  log('⚡ Copiando localStorage para Supabase...');
  try{
    const ls=JSON.parse(localStorage.getItem('dnc-tasks-v1')||'[]');
    log('📱 '+ls.length+' tarefas no localStorage');
    const{error}=await sb.from('dnc_tasks').upsert({id:'andre_godoy',data:JSON.stringify(ls)},{onConflict:'id'});
    if(error){
      log('❌ Falhou: '+error.message);
      log('→ RLS bloqueando. Verifique Policies no Supabase.');
    }else{
      log('✅ localStorage sincronizado para Supabase com sucesso!');
      log('→ Agora recarregue o app principal com Ctrl+Shift+R');
    }
  }catch(e){log('❌ '+e.message);}
}

function verLocalStorage(){
  try{
    const ls=JSON.parse(localStorage.getItem('dnc-tasks-v1')||'[]');
    log('📋 localStorage ('+ls.length+' tasks):');
    ls.forEach((t,i)=>log(i+1+'. ['+t.prio+'] '+t.title?.slice(0,60)));
  }catch(e){log('❌ '+e.message);}
}

const TASKS=[
  {prio:'alta',date:td(),title:'[CRITICO] Planejar migracao Supabase de blob para rows — Fase 2',desc:'Padrao blob vai estourar em 1MB. Migracao obrigatoria na Fase 2.'},
  {prio:'alta',date:td(),title:'[CRITICO] Estado global sem controle — planejar React+Zustand Fase 2',desc:'41 variaveis globais mutaveis. Solucao na Fase 2.'},
  {prio:'alta',date:td(),title:'[ALTO] Verificar RLS ativa em todas as 13 tabelas Supabase URGENTE',desc:'Anon key publica no GitHub. Verificar Supabase > Authentication > Policies para todas as tabelas.'},
  {prio:'alta',date:td(),title:'[ALTO] Paginacao na lista de pedidos ML — 630+ DOM nodes trava mobile',desc:'Implementar 50 por pagina com botao Ver mais. Alta prioridade performance mobile.'},
  {prio:'alta',date:td(),title:'[ALTO] Auditoria XSS em todas as funcoes render — esc() obrigatorio',desc:'Campos de usuario em onclick sem esc(). Titulos ML com aspas quebram JS.'},
  {prio:'alta',date:td(),title:'[ALTO] Criar shared.js com logica comum entre desktop e mobile',desc:'genId, fmtBRL, sbGet duplicados. Extrair para shared.js.'},
  {prio:'alta',date:td(),title:'[ALTO] Validacao de schema ao carregar dados do Supabase',desc:'tasks=sT sem verificar se e array. Adicionar guards if(!Array.isArray(x))return[].'},
  {prio:'alta',date:tdN(7),title:'[ALTO] Testes minimos para funcoes financeiras — calcDAS errado = perda real',desc:'calcDAS, calcPrecificacao sem testes. Usar Vitest: 20 casos para 5 funcoes criticas.'},
  {prio:'alta',date:td(),title:'[ALTO OK] Bug fuso horario mobile corrigido — validar em producao',desc:'toISOString() UTC corrigido para hora local. Validar criando tarefa hoje no mobile.'},
  {prio:'alta',date:td(),title:'[ALTO OK] Race condition saves corrigido — validar em producao',desc:'Debounce 400ms adicionado. Validar criando tarefa e marcando outra rapidamente.'},
  {prio:'alta',date:td(),title:'[ALTO OK] Token ML expira sem aviso — banner adicionado',desc:'mlCheckToken() com banner vermelho adicionado. Validar quando token expirar.'},
  {prio:'alta',date:td(),title:'[ALTO OK] sbUpsert sem guarda de tamanho — aviso 800KB adicionado',desc:'Bloqueio em 1MB adicionado. Monitorar console por avisos.'},
  {prio:'media',date:td(),title:'[MEDIO OK] Filtros calendario nao persistiam — corrigido',desc:'calFilters salva em localStorage. Validar desativando filtro e navegando.'},
  {prio:'media',date:td(),title:'[MEDIO OK] Painel precificacao nao fechava — corrigido',desc:'nav() agora chama closePrecPanel(). Validar abrindo calculadora e navegando.'},
  {prio:'media',date:td(),title:'[MEDIO OK] Diagnostico ML sem timeout — AbortController 15s adicionado',desc:'Validar em conexao lenta.'},
  {prio:'media',date:tdN(14),title:'[MEDIO] PIN em plaintext — implementar SHA-256',desc:'crypto.subtle.digest SHA-256. Nunca armazenar PIN direto.'},
  {prio:'media',date:tdN(14),title:'[MEDIO] Service Worker para funcionamento offline basico',desc:'sw.js com cache de assets criticos. App quebra sem internet mesmo com dados locais.'},
  {prio:'media',date:tdN(14),title:'[MEDIO] Claude API sem retry — JSON invalido quebra UI',desc:'Wrapper callClaude() com 1 retry automatico apos 2s.'},
  {prio:'media',date:tdN(14),title:'[MEDIO] Rotina limpeza dados antigos Supabase',desc:'Orders >180 dias, keywords deletadas. Botao em Configuracoes > Manutencao.'},
  {prio:'baixa',date:null,title:'[BAIXO] Otimizar renderSidebar com dirty flag',desc:'Sidebar reconstroi DOM centenas de vezes. Adicionar dirty flag.'},
];

async function injetarTarefas(){
  log('🚀 Iniciando injecao de tarefas...');
  try{
    // First read existing
    const{data,error}=await sb.from('dnc_tasks').select('data').eq('id','andre_godoy').single();
    let existing=[];
    if(!error&&data?.data){
      try{existing=JSON.parse(data.data);}catch(e){}
    }
    if(!Array.isArray(existing))existing=[];
    log('📖 '+existing.length+' tarefas existentes no Supabase');

    // Dedup
    const titles=new Set(existing.map(t=>(t.title||'').slice(0,40)));
    const toAdd=TASKS.filter(t=>!titles.has(t.title.slice(0,40)));
    
    if(toAdd.length===0){
      log('✅ Todas as tarefas ja existem. Nada a adicionar.');
      return;
    }

    const newTasks=toAdd.map(t=>({
      id:gid(),col:'todo',area:'dnc',
      prio:t.prio,title:t.title,desc:t.desc||'',
      date:t.date||'',resp:'andre'
    }));

    const merged=[...existing,...newTasks];
    log('💾 Salvando '+merged.length+' tarefas no Supabase...');

    const{error:e2}=await sb.from('dnc_tasks').upsert(
      {id:'andre_godoy',data:JSON.stringify(merged)},
      {onConflict:'id'}
    );

    if(e2){
      log('❌ ERRO ao salvar: '+e2.message+' | code: '+e2.code);
      if(e2.code==='42501'||e2.message.includes('permission')){
        log('→ RLS bloqueando INSERT. Va no Supabase > Table Editor > dnc_tasks > RLS');
        log('→ Clique em "Add Policy" > "Enable read/write access" > Save');
      }
    }else{
      log('✅ '+newTasks.length+' tarefas criadas com sucesso!');
      log('→ Feche esta pagina e abra o DNC Flow com Ctrl+Shift+R');
      set('r-count',merged.length+' tarefas','ok');
    }
  }catch(e){
    log('❌ Excecao: '+e.message);
  }
}

// Auto-run on load
diagnostico();
</script>
</body>
</html>
